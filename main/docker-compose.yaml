services:

  app1:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: laravel_app1
    restart: unless-stopped
    ports:
      - "9000:9000"
      - "50051:50051"
    working_dir: /var/www
    volumes:
      - .:/var/www
      - ./storage:/var/www/storage
    environment:
      - APP_ENV=local
      - APP_KEY=${APP_KEY}
      - DB_WRITE_HOST=mysql_primary
      - DB_READ_HOST=mysql_replica
      - DB_PORT=3306
      - DB_DATABASE=${DB_DATABASE}
      - DB_USERNAME=${DB_USERNAME}
      - DB_PASSWORD=${DB_PASSWORD}
      - REDIS_HOST=redis
      - REDIS_PORT=6379
    depends_on:
      mysql_primary:
        condition: service_healthy
      redis:
        condition: service_started
    networks:
      - game_network

  app2:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: laravel_app2
    restart: unless-stopped
    working_dir: /var/www
    volumes:
      - .:/var/www
    environment:
      - APP_ENV=local
      - APP_KEY=${APP_KEY}
      - DB_WRITE_HOST=mysql_primary
      - DB_READ_HOST=mysql_replica
      - DB_PORT=3306
      - DB_DATABASE=${DB_DATABASE}
      - DB_USERNAME=${DB_USERNAME}
      - DB_PASSWORD=${DB_PASSWORD}
      - REDIS_HOST=redis
      - REDIS_PORT=6379
    depends_on:
      mysql_primary:
        condition: service_healthy
      redis:
        condition: service_started
    networks:
      - game_network

  grpc_ranking:
    build:
      context: ./grpc
      dockerfile: node-servers/Dockerfile        # reuse same image, just different CMD
    container_name: grpc_ranking
    command: node ranking-server.js
    restart: unless-stopped
    environment:
      - USER_DB_WRITE_HOST=mysql_user_primary
      - USER_DB_READ_HOST=mysql_user_replica
      - DB_PORT=3306
      - USER_DB_DATABASE=${USER_DB_DATABASE}
      - DB_USERNAME=${DB_USERNAME}
      - DB_PASSWORD=${DB_PASSWORD}
      - REDIS_HOST=redis
      - REDIS_PORT=6379
    depends_on:
      mysql_primary:
        condition: service_healthy
      redis:
        condition: service_started
    networks:
      - game_network

  # NEW — User gRPC server
  grpc_user:
    build:
      context: ./grpc
      dockerfile: node-servers/Dockerfile
    container_name: grpc_user
    command: node user-server.js
    restart: unless-stopped
    environment:
      - DB_WRITE_HOST=mysql_primary
      - DB_READ_HOST=mysql_replica
      - DB_PORT=3306
      - DB_DATABASE=${DB_DATABASE}
      - DB_USERNAME=${DB_USERNAME}
      - DB_PASSWORD=${DB_PASSWORD}
    depends_on:
      mysql_primary:
        condition: service_healthy
    networks:
      - game_network

  raft_node_1:
    build:
      context: ./grpc
      dockerfile: node-servers/Dockerfile
    container_name: raft_node_1
    command: node raft/node1.js
    restart: unless-stopped
    networks:
      - game_network

  raft_node_2:
    build:
      context: ./grpc
      dockerfile: node-servers/Dockerfile
    container_name: raft_node_2
    command: node raft/node2.js
    restart: unless-stopped
    networks:
      - game_network

  raft_node_3:
    build:
      context: ./grpc
      dockerfile: node-servers/Dockerfile
    container_name: raft_node_3
    command: node raft/node3.js
    restart: unless-stopped
    networks:
      - game_network

  nginx:
    image: nginx:alpine
    container_name: nginx
    restart: unless-stopped
    ports:
      - "8080:80"
    volumes:
      - .:/var/www
      - ./docker/nginx/default.conf:/etc/nginx/conf.d/default.conf
    depends_on:
      - app1
      - app2
    networks:
      - game_network


  mysql_primary:
    image: mysql:8.0
    container_name: mysql_primary
    restart: unless-stopped
    command:
      - --server-id=1
      - --log-bin=mysql-bin
      - --binlog-format=ROW
      - --gtid-mode=ON
      - --enforce-gtid-consistency=ON
    environment:
      MYSQL_DATABASE: ${DB_DATABASE}
      MYSQL_USER: ${DB_USERNAME}
      MYSQL_PASSWORD: ${DB_PASSWORD}
      MYSQL_ROOT_PASSWORD: ${DB_ROOT_PASSWORD}
    ports:
      - "3307:3306"
    volumes:
      - mysql_primary_data:/var/lib/mysql
      - ./docker/mysql/primary-init.sql:/docker-entrypoint-initdb.d/init.sql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      timeout: 10s
      retries: 5
    networks:
      - game_network


  mysql_replica:
    image: mysql:8.0
    container_name: mysql_replica
    restart: unless-stopped
    command:
      - --server-id=2
      - --log-bin=mysql-bin
      - --binlog-format=ROW
      - --gtid-mode=ON
      - --enforce-gtid-consistency=ON
      - --relay-log=relay-bin
      - --read-only=ON          # rejects writes, replica is READ ONLY
    environment:
      MYSQL_ROOT_PASSWORD: ${DB_ROOT_PASSWORD}
    ports:
      - "3308:3306"
    volumes:
      - mysql_replica_data:/var/lib/mysql
    depends_on:
      mysql_primary:
        condition: service_healthy
    networks:
      - game_network

  # ── replication setup container, runs once then exits ──
  mysql_replica_setup:
    image: mysql:8.0
    container_name: mysql_replica_setup
    depends_on:
      - mysql_primary
      - mysql_replica
    environment:
      DB_ROOT_PASSWORD: ${DB_ROOT_PASSWORD}
      DB_REPL_USER: ${DB_REPL_USER}
      DB_REPL_PASSWORD: ${DB_REPL_PASSWORD}
    volumes:
      - ./docker/mysql/setup-replication.sh:/setup-replication.sh
    entrypoint: ["bash", "/setup-replication.sh"]
    networks:
      - game_network

  # ── User Service MySQL Primary ─────────────────────
  mysql_user_primary:
    image: mysql:8.0
    container_name: mysql_user_primary
    restart: unless-stopped
    command:
      - --server-id=3
      - --log-bin=mysql-bin
      - --binlog-format=ROW
      - --gtid-mode=ON
      - --enforce-gtid-consistency=ON
    environment:
      MYSQL_DATABASE: user_service_db
      MYSQL_USER: ${DB_USERNAME}
      MYSQL_PASSWORD: ${DB_PASSWORD}
      MYSQL_ROOT_PASSWORD: ${DB_ROOT_PASSWORD}
    ports:
      - "3309:3306"
    volumes:
      - mysql_user_data:/var/lib/mysql
      - ./docker/mysql/primary-init.sql:/docker-entrypoint-initdb.d/init.sql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      timeout: 10s
      retries: 5
    networks:
      - game_network

  # ── User Service MySQL Replica ──────────────────────
  mysql_user_replica:
    image: mysql:8.0
    container_name: mysql_user_replica
    restart: unless-stopped
    command:
      - --server-id=4
      - --log-bin=mysql-bin
      - --binlog-format=ROW
      - --gtid-mode=ON
      - --enforce-gtid-consistency=ON
      - --relay-log=relay-bin
      - --read-only=ON
    environment:
      MYSQL_ROOT_PASSWORD: ${DB_ROOT_PASSWORD}
    ports:
      - "3310:3306"
    volumes:
      - mysql_user_replica_data:/var/lib/mysql
    depends_on:
      mysql_user_primary:
        condition: service_healthy
    networks:
      - game_network

  mysql_user_replica_setup:
    image: mysql:8.0
    container_name: mysql_user_replica_setup
    depends_on:
      - mysql_user_primary
      - mysql_user_replica
    environment:
      DB_ROOT_PASSWORD: ${DB_ROOT_PASSWORD}
      DB_REPL_USER: ${DB_REPL_USER}
      DB_REPL_PASSWORD: ${DB_REPL_PASSWORD}
    volumes:
      - ./docker/mysql/setup-user-replication.sh:/setup-replication.sh
    entrypoint: ["bash", "/setup-replication.sh"]
    networks:
      - game_network

  redis:
    image: redis:alpine
    container_name: redis_cache
    restart: unless-stopped
    ports:
      - "6379:6379"
    networks:
      - game_network

volumes:
  mysql_primary_data:
  mysql_replica_data:
  mysql_user_data:
  mysql_user_replica_data:

networks:
  game_network:
    driver: bridge
