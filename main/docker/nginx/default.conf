# Defines the pool of backend servers Nginx picks between
upstream laravel_backend {
    server app1:9000 max_fails=3 fail_timeout=10s;
    server app2:9000 max_fails=3 fail_timeout=10s backup; # ← passive, only used if app1 fails
}

server {
    listen 80;
    server_name localhost;
    root /var/www/public;
    index index.php index.html;

    location / {
        try_files $uri $uri/ /index.php?$query_string;
    }

    location ~ \.php$ {
        fastcgi_pass laravel_backend;         # app = service name, 9000 = fpm port
        fastcgi_index index.php;
        fastcgi_param SCRIPT_FILENAME $realpath_root$fastcgi_script_name;
        include fastcgi_params;

        # If app1 fails mid-request, retry on app2
        fastcgi_next_upstream error timeout invalid_header;
    }

    location ~ /\.ht {
        deny all;
    }
}
